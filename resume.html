<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="header"></div>

    <iframe
        src="files/resume.pdf"
        class="resume-frame">
    </iframe>

<script>
    fetch("header.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
  </script>

</body>
</html>
