<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="projects-section">
    <h2>Research & Projects</h2>
    <div id="projects" class ="projects-grid"></div>
    
  </main>

  <script>
    fetch("header.html")
    .then(response => response.text())
    .then(data => {
      document.getElementById("header").innerHTML = data;
    });
  </script>

  <script>
    fetch("projects.json")
      .then(r => r.json())
      .then(projects => {
        const container = document.getElementById("projects");

        projects.forEach(p => {
          const card = document.createElement("section");
          card.className = "card";

          card.innerHTML = `

            <div class="card-image-wrapper">

                <img src="${p["cover-image"] || 'placeholder.jpg'}"
                    alt="${p.title}">

                <div class="card-year">
                    ${p.year}
                </div>

            </div>

            <div class="card-content">

                <h3>
                    <a href="${p.link}">
                        ${p.title}
                    </a>
                </h3>

                <p>${p.summary}</p>

                <div class="card-tags">

                    ${p.tags.map(tag =>
                        `<span class="${tag.toLowerCase().replace(/\s+/g,'-')}">${tag}</span>`
                    ).join("")}

                </div>

            </div>
            `;

          container.appendChild(card);
        });
      });
</script>


</body>
</html>
